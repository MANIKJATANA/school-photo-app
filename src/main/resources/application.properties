spring.application.name=photo-app

# ============ Datasource (Postgres) ============
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/photoapp}
spring.datasource.username=${DB_USER:photoapp}
spring.datasource.password=${DB_PASSWORD:photoapp}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============ JPA / Hibernate ============
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============ Flyway ============
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# ============ Server ============
server.port=${SERVER_PORT:8080}
server.error.include-message=always
server.error.include-binding-errors=always

# ============ Actuator ============
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============ JWT ============
# 256-bit secret. In dev only — production must be env-driven and rotated.
photoapp.jwt.secret=${JWT_SECRET:dev-only-secret-replace-me-with-32-byte-base64-encoded-key-for-prod}
photoapp.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
photoapp.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:1209600}
photoapp.jwt.issuer=${JWT_ISSUER:photoapp}

# ============ S3 ============
photoapp.s3.bucket=${S3_BUCKET:photo-app-dev}
photoapp.s3.region=${S3_REGION:us-east-1}
photoapp.s3.endpoint=${S3_ENDPOINT:http://localhost:4566}
photoapp.s3.path-style-access=${S3_PATH_STYLE:true}
photoapp.s3.access-key=${S3_ACCESS_KEY:test}
photoapp.s3.secret-key=${S3_SECRET_KEY:test}
photoapp.s3.put-url-ttl-seconds=600
photoapp.s3.get-url-ttl-seconds=300

# ============ ML service ============
photoapp.ml.base-url=${ML_BASE_URL:http://localhost:8081}
photoapp.ml.hmac-secret=${ML_HMAC_SECRET:dev-only-hmac-secret-replace-in-prod}
photoapp.ml.connect-timeout-millis=2000
photoapp.ml.read-timeout-millis=30000

# ============ Outbox poller ============
photoapp.outbox.poll-interval-millis=2000
photoapp.outbox.batch-size=50
photoapp.outbox.max-attempts=5

# ============ Stale-upload sweeper ============
photoapp.upload.pending-ttl-minutes=60
photoapp.upload.sweeper-interval-minutes=15
