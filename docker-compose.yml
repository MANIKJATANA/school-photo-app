services:
  postgres:
    image: postgres:16-alpine
    container_name: photoapp-postgres
    environment:
      POSTGRES_DB: photoapp
      POSTGRES_USER: photoapp
      POSTGRES_PASSWORD: photoapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photoapp -d photoapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    container_name: photoapp-localstack
    environment:
      SERVICES: s3
      DEBUG: 0
      DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init:/etc/localstack/init/ready.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"\\(running\\|available\\)\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-ml:
    # Stub ML service for local dev. Returns 202 to any /runs POST.
    # The real Python ML service lives in a separate repo (ADR 0002).
    image: mockoon/cli:9
    container_name: photoapp-mock-ml
    command: ["--data", "/data/mock-ml.json", "--port", "8081"]
    ports:
      - "8081:8081"
    volumes:
      - ./infra/mock-ml:/data:ro

volumes:
  postgres-data:
  localstack-data:
